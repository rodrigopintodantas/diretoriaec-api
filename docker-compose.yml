services:
  api:
    build: .
    container_name: base-api
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:12.3
    container_name: base-postgres
    environment:
      POSTGRES_DB: base
      POSTGRES_USER: base
      POSTGRES_PASSWORD: initial123
    ports:
      - "5447:5432"
    volumes:
      - base-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  base-postgres-data:
